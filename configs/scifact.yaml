run_name: scifact
seed: 0
seeds: [0, 1, 2]

dataset:
  name: scifact
  beir_data_dir: data/raw/scifact
  split: test
  candidate_pool_size: 20   # k=20 candidates per query
  max_queries: null

judge:
  provider: groq
  api_key_env: GROQ_API_KEY
  models:
    - id: llama-3.1-8b-instant
      name: judge_a
    - id: llama-3.1-8b-instant
      name: judge_b
  prompt_version: v1
  cache_dir: data/cache
  max_retries: 5
  backoff_base_seconds: 2.0
  requests_per_minute: 60
  repeat_calls_for_flip_rate: 2

rating_fit:
  method: bradley_terry
  cross_query_bias: true
  optimizer: newton
  max_iters: 200
  tol: 1.0e-8
  l2_reg: 1.0e-4

comparisons:
  initial_random_round_per_query: 10

wandb:
  enabled: false
  mode: offline
  project: zelo-curriculum-study

output_dir: results/phase1/scifact

phase2:
  comparison_budget: 400
  checkpoints_fractions: [0.25, 0.5, 0.75, 1.0]
  eval_query_fraction: 0.3
  target_ndcg: 0.8
  target_ece: 0.1
  base_model: cross-encoder/ms-marco-MiniLM-L-6-v2
  arms: [random, difficulty_curriculum, anti_curriculum, compositional_curriculum]
  output_dir: results/phase2/scifact
