run_name: smoke
seed: 0
seeds: [0]

dataset:
  name: fiqa
  beir_data_dir: data/raw/fiqa
  split: test
  candidate_pool_size: 5    # smaller pool for a fast smoke run
  max_queries: 5            # only 5 queries

judge:
  provider: openrouter
  api_key_env: OPENROUTER_API_KEY
  models:
    - id: meta-llama/llama-3.1-8b-instruct:free
      name: judge_a
    - id: google/gemini-flash-1.5-8b:free
      name: judge_b
  prompt_version: v1
  cache_dir: data/cache
  max_retries: 2
  backoff_base_seconds: 1.0
  requests_per_minute: 15
  repeat_calls_for_flip_rate: 2
  offline_mock: true   # smoke run uses a deterministic mock judge instead of real API calls

rating_fit:
  method: bradley_terry
  cross_query_bias: true
  optimizer: newton
  max_iters: 50
  tol: 1.0e-6
  l2_reg: 1.0e-4

comparisons:
  initial_random_round_per_query: 4

wandb:
  enabled: false
  mode: offline
  project: zelo-curriculum-study

output_dir: results/phase1/smoke

phase2:
  comparison_budget: 8
  checkpoints_fractions: [0.5, 1.0]
  eval_query_fraction: 0.4
  target_ndcg: 0.6
  target_ece: 0.3
  base_model: cross-encoder/ms-marco-MiniLM-L-6-v2
  arms: [random, difficulty_curriculum, anti_curriculum, compositional_curriculum]
  output_dir: results/phase2/smoke
